<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Zamblak Penpot Safe Speed Stopwatch Icon</title>
  <desc id="desc">Flat teal stopwatch icon with balanced speed gap and lime checkmark.</desc>

  <!-- Stopwatch stem -->
  <rect x="475" y="206" width="74" height="92" rx="8" fill="#0F3D3E"/>

  <!-- Stopwatch crown -->
  <rect x="404" y="130" width="216" height="84" rx="24" fill="#0F3D3E"/>

  <!-- Stopwatch ring with balanced narrow speed gap -->
