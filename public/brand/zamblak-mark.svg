  <!-- Completion checkmark -->
  <path
    d="M 391 476
       C 382 476 378 486 384 493
       L 501 620
       C 513 633 533 633 545 620
       L 795 352
       C 804 342 793 333 781 342
       L 535 541
       C 525 549 510 548 501 538
       L 461 496
